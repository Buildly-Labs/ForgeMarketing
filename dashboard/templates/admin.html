{% extends "base.html" %}

{% block content %}
<div class="space-y-6" x-data="adminPanel()">
    <!-- Header -->
    <div class="bg-white rounded-lg p-6 card-shadow">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">
                    <i class="fas fa-cogs mr-2 text-blue-600"></i>
                    Admin Panel
                </h1>
                <p class="text-gray-600 mt-1">Manage system configuration, API keys, and platform connections</p>
            </div>
            <div class="flex space-x-3">
                <button @click="testAllConnections()"
                        :disabled="testing"
                        class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 disabled:opacity-50 transition-colors">
                    <i class="fas fa-check-circle mr-2" :class="{'fa-spin': testing}"></i>
                    <span x-show="!testing">Test All</span>
                    <span x-show="testing">Testing...</span>
                </button>
                <button @click="saveAll()"
                        :disabled="saving"
                        class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors">
                    <i class="fas fa-save mr-2"></i>
                    <span x-show="!saving">Save All</span>
                    <span x-show="saving">Saving...</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Connection Status Overview -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
        <div class="bg-white rounded-lg p-6 card-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">AI Service</p>
                    <p class="text-lg font-bold" :class="connectionStatus.ai ? 'text-green-600' : 'text-red-600'"
                       x-text="connectionStatus.ai ? 'Connected' : 'Not Connected'">Checking...</p>
                </div>
                <i class="fas fa-robot text-2xl" :class="connectionStatus.ai ? 'text-green-500' : 'text-gray-400'"></i>
            </div>
        </div>
        <div class="bg-white rounded-lg p-6 card-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">Email SMTP</p>
                    <p class="text-lg font-bold" :class="connectionStatus.email ? 'text-green-600' : 'text-red-600'"
                       x-text="connectionStatus.email ? 'Connected' : 'Not Connected'">Checking...</p>
                </div>
                <i class="fas fa-envelope text-2xl" :class="connectionStatus.email ? 'text-green-500' : 'text-gray-400'"></i>
            </div>
        </div>
        <div class="bg-white rounded-lg p-6 card-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">Twitter/X</p>
                    <p class="text-lg font-bold" :class="connectionStatus.twitter ? 'text-green-600' : 'text-red-600'"
                       x-text="connectionStatus.twitter ? 'Connected' : 'Not Connected'">Not Connected</p>
                </div>
                <i class="fab fa-twitter text-2xl" :class="connectionStatus.twitter ? 'text-green-500' : 'text-gray-400'"></i>
            </div>
        </div>
        <div class="bg-white rounded-lg p-6 card-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">BlueSky</p>
                    <p class="text-lg font-bold" :class="connectionStatus.bluesky ? 'text-green-600' : 'text-red-600'"
                       x-text="connectionStatus.bluesky ? 'Connected' : 'Not Connected'">Not Connected</p>
                </div>
                <i class="fas fa-cloud text-2xl" :class="connectionStatus.bluesky ? 'text-green-500' : 'text-gray-400'"></i>
            </div>
        </div>
        <div class="bg-white rounded-lg p-6 card-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-medium text-gray-600">LinkedIn</p>
                    <p class="text-lg font-bold" :class="connectionStatus.linkedin ? 'text-green-600' : 'text-red-600'"
                       x-text="connectionStatus.linkedin ? 'Connected' : 'Not Connected'">Not Connected</p>
                </div>
                <i class="fab fa-linkedin text-2xl" :class="connectionStatus.linkedin ? 'text-green-500' : 'text-gray-400'"></i>
            </div>
        </div>
    </div>

    <!-- Config Wizard Tabs -->
    <div class="bg-white rounded-lg p-6 card-shadow">
        <div x-show="loading" class="text-center py-8 text-gray-500">
            <i class="fas fa-spinner fa-spin mr-2"></i> Loading configuration&hellip;
        </div>

        <template x-if="!loading">
            <div>
                <!-- Category tabs -->
                <div class="flex flex-wrap gap-2 mb-6">
                    <template x-for="(cat, catKey) in schema" :key="catKey">
                        <button @click="activeTab = catKey"
                                :class="activeTab === catKey ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-700'"
                                class="px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                            <span x-text="cat.label"></span>
                        </button>
                    </template>
                </div>

                <!-- Dynamic field panels -->
                <template x-for="(cat, catKey) in schema" :key="'panel-'+catKey">
                    <div x-show="activeTab === catKey" class="space-y-4">
                        <h3 class="text-lg font-semibold text-gray-800" x-text="cat.label + ' Settings'"></h3>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                            <template x-for="field in cat.fields" :key="field.key">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1" x-text="field.label"></label>
                                    <div class="relative">
                                        <!-- Select dropdown for enum fields -->
                                        <template x-if="field.type === 'select'">
                                            <select :value="values[field.key] || field.default || ''"
                                                    @change="values[field.key] = $event.target.value; dirty = true"
                                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                                                <template x-for="opt in field.options" :key="opt">
                                                    <option :value="opt" x-text="opt" :selected="(values[field.key] || field.default) === opt"></option>
                                                </template>
                                            </select>
                                        </template>
                                        <!-- Text / password input for everything else -->
                                        <template x-if="field.type !== 'select'">
                                            <div class="relative">
                                                <input :type="field.secret && !showSecrets[field.key] ? 'password' : 'text'"
                                                       :value="values[field.key] || ''"
                                                       @input="values[field.key] = $event.target.value; dirty = true"
                                                       :placeholder="field.default || ''"
                                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 pr-10">
                                                <button x-show="field.secret" @click="showSecrets[field.key] = !showSecrets[field.key]"
                                                        type="button"
                                                        class="absolute inset-y-0 right-0 px-3 text-gray-400 hover:text-gray-600">
                                                    <i :class="showSecrets[field.key] ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
                                                </button>
                                            </div>
                                        </template>
                                    </div>
                                    <p x-show="values[field.key] === '***'" class="text-xs text-amber-600 mt-1">
                                        Value is stored. Enter a new value to replace it, or leave unchanged.
                                    </p>
                                </div>
                            </template>
                        </div>

                        <div class="flex items-center space-x-3 pt-4 border-t">
                            <button @click="saveCategory(catKey)"
                                    :disabled="saving"
                                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 disabled:opacity-50 transition-colors text-sm">
                                <i class="fas fa-save mr-1"></i> Save <span x-text="cat.label"></span>
                            </button>
                            <button @click="testConnection(catKey)" :disabled="testing"
                                    x-show="['ai','email','social'].includes(catKey)"
                                    class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 disabled:opacity-50 transition-colors text-sm">
                                <i class="fas fa-plug mr-1"></i> Test Connection
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- Results/Messages -->
    <div x-show="message" class="bg-white rounded-lg p-6 card-shadow"
         :class="messageType === 'success' ? 'border-l-4 border-green-500' : 'border-l-4 border-red-500'">
        <div class="flex items-center">
            <i :class="messageType === 'success' ? 'fas fa-check-circle text-green-500' : 'fas fa-exclamation-circle text-red-500'" class="mr-3"></i>
            <span x-text="message" class="font-medium"></span>
        </div>
    </div>
</div>

<script>
const SCRIPT_ROOT = {{ request.script_root | tojson }};
function adminPanel() {
    return {
        activeTab: '',
        loading: true,
        testing: false,
        saving: false,
        dirty: false,
        message: '',
        messageType: 'success',
        schema: {},       // from /api/admin/config/schema
        values: {},       // key -> current value
        showSecrets: {},  // key -> bool (toggle visibility)
        connectionStatus: {
            ai: false, email: false, twitter: false, bluesky: false, linkedin: false
        },

        async init() {
            await this.loadSchema();
            await this.loadValues();
            this.checkAllConnections();
            this.loading = false;
        },

        async loadSchema() {
            try {
                const res = await fetch(SCRIPT_ROOT + '/api/admin/config/schema');
                const data = await res.json();
                if (data.success) {
                    this.schema = data.schema;
                    // default to first tab
                    const keys = Object.keys(this.schema);
                    if (keys.length) this.activeTab = keys[0];
                    // init showSecrets map
                    for (const cat of Object.values(this.schema)) {
                        for (const f of cat.fields) {
                            this.showSecrets[f.key] = false;
                        }
                    }
                }
            } catch (e) {
                console.error('Failed to load config schema', e);
            }
        },

        async loadValues() {
            try {
                const res = await fetch(SCRIPT_ROOT + '/api/admin/config');
                const data = await res.json();
                if (data.success) {
                    const map = {};
                    for (const c of data.configs) {
                        map[c.key] = c.value;
                    }
                    this.values = map;
                }
            } catch (e) {
                console.error('Failed to load config values', e);
            }
        },

        categoryItems(catKey) {
            const cat = this.schema[catKey];
            if (!cat) return [];
            return cat.fields.map(f => ({
                key: f.key,
                value: this.values[f.key] || '',
                category: catKey,
                is_secret: !!f.secret,
            })).filter(i => i.value && i.value !== '***');
        },

        async saveCategory(catKey) {
            this.saving = true;
            try {
                const items = this.categoryItems(catKey);
                if (!items.length) {
                    this.showMessage('No values to save in this category.', 'error');
                    return;
                }
                const res = await fetch(SCRIPT_ROOT + '/api/admin/config', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items}),
                });
                const data = await res.json();
                if (data.success) {
                    this.showMessage(`Saved ${data.saved.length} setting(s).`, 'success');
                    this.dirty = false;
                } else {
                    this.showMessage('Save failed: ' + data.error, 'error');
                }
            } catch (e) {
                this.showMessage('Save error: ' + e.message, 'error');
            } finally {
                this.saving = false;
            }
        },

        async saveAll() {
            this.saving = true;
            try {
                const items = [];
                for (const catKey of Object.keys(this.schema)) {
                    items.push(...this.categoryItems(catKey));
                }
                if (!items.length) {
                    this.showMessage('No values to save.', 'error');
                    this.saving = false;
                    return;
                }
                const res = await fetch(SCRIPT_ROOT + '/api/admin/config', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({items}),
                });
                const data = await res.json();
                if (data.success) {
                    this.showMessage(`Saved ${data.saved.length} setting(s).`, 'success');
                    this.dirty = false;
                } else {
                    this.showMessage('Save failed: ' + data.error, 'error');
                }
            } catch (e) {
                this.showMessage('Save error: ' + e.message, 'error');
            } finally {
                this.saving = false;
            }
        },

        async checkAllConnections() {
            try {
                const res = await fetch(SCRIPT_ROOT + '/api/admin/test-connections');
                const data = await res.json();
                if (data.success) {
                    this.connectionStatus = {
                        ai: data.results.ai || false,
                        email: data.results.email || false,
                        twitter: data.results.twitter || false,
                        bluesky: data.results.bluesky || false,
                        linkedin: data.results.linkedin || false,
                    };
                }
            } catch (e) {
                console.error('Connection check error', e);
            }
        },

        async testConnection(platform) {
            this.testing = true;
            try {
                const res = await fetch(`${SCRIPT_ROOT}/api/admin/test-connection/${platform}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({}),
                });
                const data = await res.json();
                if (data.success) {
                    this.connectionStatus[platform] = true;
                    this.showMessage(`${platform} connection successful!`, 'success');
                } else {
                    this.connectionStatus[platform] = false;
                    this.showMessage(`${platform} connection failed: ${data.error}`, 'error');
                }
            } catch (e) {
                this.showMessage(`Test error: ${e.message}`, 'error');
            } finally {
                this.testing = false;
            }
        },

        async testAllConnections() {
            this.testing = true;
            const platforms = ['ai', 'email', 'social'];
            for (const p of platforms) { await this.testConnection(p); }
            this.testing = false;
        },

        showMessage(text, type) {
            this.message = text;
            this.messageType = type;
            setTimeout(() => { this.message = ''; }, 5000);
        }
    };
}
</script>
{% endblock %}
