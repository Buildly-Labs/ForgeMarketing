{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold">Lead Radar Settings</h1>
    <p class="text-sm text-gray-600">Configure brand-level settings for lead workflow and safety.</p>
  </div>

  <div class="bg-white rounded-lg shadow p-4 grid grid-cols-1 md:grid-cols-3 gap-2">
    <input id="brand_name" placeholder="brand_name" class="border rounded p-2" />
    <input id="module_name" placeholder="module_name" class="border rounded p-2" value="Lead Radar" />
    <input id="safety_warning" placeholder="safety warning text" class="border rounded p-2" value="ForgeMarketing creates research notes and draft outreach only." />
    <label class="flex items-center gap-2 text-sm"><input id="always_on_research" type="checkbox" checked /> Always-on research</label>
    <label class="flex items-center gap-2 text-sm"><input id="auto_run_on_login" type="checkbox" /> Auto-run due research on login</label>
    <input id="target_new_candidates_daily" type="number" min="1" value="10" class="border rounded p-2" placeholder="target new candidates daily" />
    <button onclick="loadSettings()" class="bg-blue-600 text-white rounded p-2">Load</button>
    <button onclick="saveSettings()" class="bg-gray-900 text-white rounded p-2">Save</button>
  </div>

  <div class="bg-white rounded-lg shadow p-4">
    <pre id="settings_view" class="text-xs whitespace-pre-wrap"></pre>
  </div>
</div>

<script>
async function loadSettings() {
  const brand = document.getElementById('brand_name').value.trim();
  if (!brand) { alert('brand_name is required'); return; }
  const res = await fetch('/api/lead-radar/settings?brand_name=' + encodeURIComponent(brand));
  const json = await res.json();
  const settings = (json.data && json.data.settings_json) ? json.data.settings_json : {};
  document.getElementById('module_name').value = settings.module_name || 'Lead Radar';
  document.getElementById('safety_warning').value = settings.safety_warning || 'ForgeMarketing creates research notes and draft outreach only.';
  document.getElementById('always_on_research').checked = settings.always_on_research !== false;
  document.getElementById('auto_run_on_login').checked = !!settings.auto_run_on_login;
  document.getElementById('target_new_candidates_daily').value = settings.target_new_candidates_daily || 10;
  document.getElementById('settings_view').textContent = JSON.stringify(json, null, 2);
}

async function saveSettings() {
  const payload = {
    brand_name: document.getElementById('brand_name').value.trim(),
    settings_json: {
      module_name: document.getElementById('module_name').value.trim(),
      safety_warning: document.getElementById('safety_warning').value.trim(),
      allow_auto_outreach: false,
      require_human_review: true,
      always_on_research: !!document.getElementById('always_on_research').checked,
      auto_run_on_login: !!document.getElementById('auto_run_on_login').checked,
      target_new_candidates_daily: parseInt(document.getElementById('target_new_candidates_daily').value || '10', 10)
    }
  };
  const res = await fetch('/api/lead-radar/settings', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)});
  const json = await res.json();
  document.getElementById('settings_view').textContent = JSON.stringify(json, null, 2);
}
</script>
{% endblock %}
