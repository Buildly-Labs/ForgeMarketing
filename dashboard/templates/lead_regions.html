{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold">Region Profiles</h1>
    <p class="text-gray-600 text-sm mt-2">Create and manage configurable regions per brand.</p>
  </div>

  <div class="bg-white rounded-lg shadow p-4 grid grid-cols-1 md:grid-cols-3 gap-2">
    <input id="brand_name" placeholder="brand_name" class="border rounded p-2" />
    <input id="name" placeholder="region name" class="border rounded p-2" />
    <input id="owner" placeholder="owner" class="border rounded p-2" />
    <button onclick="createRegion()" class="md:col-span-3 bg-gray-900 text-white rounded p-2">Create Region</button>
  </div>

  <div class="bg-white rounded-lg shadow p-4" id="regions_list"></div>
</div>

<script>
let regionsCache = [];

async function loadRegions() {
  const brand = document.getElementById('brand_name').value.trim();
  const url = '/api/leads/regions' + (brand ? ('?brand_name=' + encodeURIComponent(brand)) : '');
  const res = await fetch(url);
  const json = await res.json();
  regionsCache = json.data || [];
  const wrap = document.getElementById('regions_list');
  const rows = regionsCache.map(r => `
    <div class="border-b py-3 text-sm">
      <div class="flex items-center justify-between gap-2">
        <div>
          <strong>${r.name}</strong> (${r.slug})
          <div class="text-xs text-gray-600">countries: ${(r.countries || []).join(', ') || '-'} | brand: ${r.brand_name}</div>
        </div>
        <span class="text-xs ${r.is_active ? 'text-green-700' : 'text-gray-500'}">${r.is_active ? 'active' : 'inactive'}</span>
      </div>
      <div class="mt-2 flex gap-2">
        <input id="region-owner-${r.id}" value="${r.owner || ''}" class="border rounded p-1 flex-1" placeholder="owner">
        <button onclick="saveRegionOwner(${r.id})" class="bg-indigo-600 text-white rounded px-2 py-1 text-xs">Save Owner</button>
      </div>
    </div>
  `);
  wrap.innerHTML = rows.join('') || '<p class="text-sm text-gray-600">No regions found.</p>';
}

async function saveRegionOwner(regionId) {
  const row = regionsCache.find(r => r.id === regionId);
  if (!row) return;

  const owner = document.getElementById(`region-owner-${regionId}`).value.trim();
  const payload = {
    name: row.name,
    slug: row.slug,
    owner: owner,
    countries: row.countries || [],
    timezone_notes: row.timezone_notes || '',
    primary_offer: row.primary_offer || '',
    entry_price_min: row.entry_price_min || 0,
    entry_price_max: row.entry_price_max || 0,
    currency: row.currency || 'USD',
    target_segments: row.target_segments || [],
    preferred_channels: row.preferred_channels || [],
    outreach_tone: row.outreach_tone || '',
    local_notes: row.local_notes || '',
    is_active: !!row.is_active
  };

  const res = await fetch(`/api/leads/regions/${regionId}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.success) {
    alert(json.error || 'Failed to update region');
    return;
  }
  loadRegions();
}

async function createRegion() {
  const payload = {
    brand_name: document.getElementById('brand_name').value.trim(),
    name: document.getElementById('name').value.trim(),
    owner: document.getElementById('owner').value.trim()
  };
  const res = await fetch('/api/leads/regions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.success) {
    alert(json.error || 'Failed to create region');
    return;
  }
  loadRegions();
}

loadRegions();
</script>
{% endblock %}
