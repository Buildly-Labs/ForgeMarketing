{% extends "base.html" %}
{% block content %}
<div class="space-y-6">
  <div class="bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold">Lead Radar Sources</h1>
    <p class="text-sm text-gray-600">Configure approved/public/manual lead sources, then run automated research to queue candidates for review.</p>
  </div>

  <div class="bg-white rounded-lg shadow p-4 grid grid-cols-1 md:grid-cols-3 gap-2">
    <input id="brand_name" placeholder="brand_name" class="border rounded p-2" />
    <input id="name" placeholder="source name" class="border rounded p-2" />
    <select id="source_type" class="border rounded p-2">
      <option>manual</option><option>google_search</option><option>rss_feed</option><option>website_directory</option><option>github</option><option>product_hunt</option><option>hacker_news</option><option>linkedin_manual</option><option>instagram_manual</option><option>reddit</option><option>youtube</option><option>newsletter</option><option>csv_import</option>
    </select>
    <input id="url" placeholder="url (optional/manual)" class="md:col-span-2 border rounded p-2" />
    <input id="owner" placeholder="owner" class="border rounded p-2" />
    <input id="query_keywords" placeholder="query keywords (comma separated)" class="md:col-span-2 border rounded p-2" />
    <select id="run_frequency" class="border rounded p-2">
      <option value="manual">manual</option>
      <option value="daily">daily</option>
      <option value="weekly">weekly</option>
      <option value="monthly">monthly</option>
    </select>
    <button onclick="createSource()" class="md:col-span-3 bg-gray-900 text-white rounded p-2">Create Source</button>
  </div>

  <div class="bg-white rounded-lg shadow p-4">
    <div class="flex gap-2 flex-wrap">
      <button onclick="loadSources()" class="bg-blue-600 text-white rounded px-3 py-2">Refresh</button>
      <button onclick="runDueSources()" class="bg-emerald-600 text-white rounded px-3 py-2">Run Due Sources</button>
    </div>
    <div id="sources" class="mt-3 text-sm"></div>
  </div>
</div>

<script>
function parseKeywords(raw) {
  if (!raw) return [];
  return raw.split(',').map(x => x.trim()).filter(Boolean);
}

async function loadSources() {
  const brand = document.getElementById('brand_name').value.trim();
  const url = '/api/lead-radar/sources' + (brand ? ('?brand_name=' + encodeURIComponent(brand)) : '');
  const res = await fetch(url);
  const json = await res.json();
  const box = document.getElementById('sources');
  box.innerHTML = (json.data || []).map(s => `
    <div class="border-b py-2">
      <div class="flex items-center justify-between gap-2">
        <div>
          <strong>${s.name}</strong> [${s.source_type}] owner=${s.owner || ''}
          <div class="text-xs text-gray-600">frequency=${s.run_frequency || 'manual'} | next=${s.next_run_at || '-'} | last=${s.last_run_at || '-'}</div>
          <div class="text-xs text-gray-500">${s.url || ''}</div>
          <div class="text-xs text-gray-500">keywords=${(s.query_keywords || []).join(', ') || '-'}</div>
        </div>
        <div class="flex gap-2">
          <button onclick="runSource(${s.id})" class="bg-emerald-600 text-white rounded px-2 py-1 text-xs">Run Now</button>
        </div>
      </div>
    </div>
  `).join('') || 'No sources';
}

async function createSource() {
  const payload = {
    brand_name: document.getElementById('brand_name').value.trim(),
    name: document.getElementById('name').value.trim(),
    source_type: document.getElementById('source_type').value,
    url: document.getElementById('url').value.trim(),
    owner: document.getElementById('owner').value.trim(),
    query_keywords: parseKeywords(document.getElementById('query_keywords').value.trim()),
    run_frequency: document.getElementById('run_frequency').value,
  };
  const res = await fetch('/api/lead-radar/sources', {
    method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (!json.success) { alert(json.error || 'Failed'); return; }
  loadSources();
}

async function runSource(sourceId) {
  const res = await fetch('/api/lead-radar/research-jobs/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ lead_source_id: sourceId })
  });
  const json = await res.json();
  if (!json.success) { alert(json.error || 'Failed'); return; }
  alert(`Run complete: ${json.data.candidates_created} candidates created from ${json.data.results_count} items.`);
  loadSources();
}

async function runDueSources() {
  const brand = document.getElementById('brand_name').value.trim();
  const res = await fetch('/api/lead-radar/research-jobs/run-due', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ brand_name: brand || undefined, limit: 25 })
  });
  const json = await res.json();
  if (!json.success) { alert(json.error || 'Failed'); return; }
  alert(`Due source run complete. Sources: ${json.data.sources_considered}, new candidates: ${json.data.total_candidates_created}.`);
  loadSources();
}

loadSources();
</script>
{% endblock %}
