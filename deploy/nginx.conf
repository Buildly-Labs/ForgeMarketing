upstream gateway {
    server 127.0.0.1:5000;
}

upstream marketing {
    server 127.0.0.1:8002;
}

upstream producer {
    server 127.0.0.1:8001;
}

server {
    listen 8080;
    server_name _;
    client_max_body_size 2G;
    # Keep slow/large uploads alive instead of resetting connections.
    client_body_timeout 1800s;
    send_timeout 1800s;

    # Gateway / login / landing page
    location / {
        proxy_pass http://gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Marketing Hub
    location /marketing/ {
        proxy_pass http://marketing;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header SCRIPT_NAME /marketing;
    }

    # Podcast Studio (Producer)
    location = /producer {
        return 301 /producer/;
    }

    location = /producer/ {
        return 302 /producer/ledger/;
    }

    location /producer/ {
        proxy_pass http://producer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header SCRIPT_NAME /producer;
        proxy_connect_timeout 30s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # Static files for Producer
    location /producer/static/ {
        alias /app/Producer/staticfiles/;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    # Served directly by nginx so they appear even when gunicorn / Django is
    # completely down.  The `internal` directive prevents direct browser access.
    error_page 502 503 504 /static_error/502.html;

    location = /static_error/502.html {
        root /app/deploy;
        internal;
    }
}
